artifacts:
- id: art-01
  type: figure
  name: "Architecture Diagram"
  path: "paper/figures/architecture.pdf"
  description: "7-module benchmark architecture diagram showing TaskLoader → AgentAdapter → BudgetController → ToolSimulator → TraceRecorder → MetricsEngine → ReportGenerator data flow."
  linked_milestone: "M3"
  created_at: "2025-01-20T00:00:00"
- id: art-02
  type: code
  name: "Benchmark Harness Package"
  path: "src/agent_budget_bench/"
  description: "Pip-installable Python package with CLI, agent adapters, tool simulators, metrics engine, and report generator."
  linked_milestone: "M7"
  created_at: "2025-01-15T00:00:00"
- id: art-03
  type: dataset
  name: "Task Instance Suite"
  path: "data/tasks/"
  description: "830 task instances across 6 families (retrieval, codegen, data_analysis, multihop_qa, planning, web_nav) with dev/test splits."
  linked_milestone: "M2"
  created_at: "2025-01-25T00:00:00"
- id: art-04
  type: code
  name: "JSONL Trace Schema"
  path: "src/agent_budget_bench/schemas/trace.py"
  description: "Pydantic V2 models for OpenTelemetry-compatible JSONL trace format with span_id, timestamps, input/output hashes."
  linked_milestone: "M2"
  created_at: "2025-01-22T00:00:00"
- id: art-05
  type: code
  name: "BudgetController Module"
  path: "src/agent_budget_bench/harness/budget_controller.py"
  description: "3-axis constraint enforcement: tool-call budget cap, latency injection (async sleep), noise injection (truncation/stale/format_error)."
  linked_milestone: "M3"
  created_at: "2025-02-05T00:00:00"
- id: art-06
  type: code
  name: "Tool Simulator Registry"
  path: "src/agent_budget_bench/tools/"
  description: "10 deterministic mock tools (search, code_executor, calculator, browser, etc.) with mock corpus data."
  linked_milestone: "M3"
  created_at: "2025-02-08T00:00:00"
- id: art-07
  type: code
  name: "Agent Adapter Framework"
  path: "src/agent_budget_bench/adapters/"
  description: "Abstract AgentAdapter base class with concrete adapters for ReAct, NoTool, RandomTool, GreedyFirst baselines."
  linked_milestone: "M4"
  created_at: "2025-02-15T00:00:00"
- id: art-08
  type: figure
  name: "Degradation Curves (Budget)"
  path: "paper/figures/degradation_budget.png"
  description: "Line plot of task accuracy vs. max tool-call budget for 4 agents across 6 task families. 2×3 facet grid, 300 DPI."
  linked_milestone: "M5"
  created_at: "2025-03-01T00:00:00"
- id: art-09
  type: figure
  name: "Degradation Curves (Latency)"
  path: "paper/figures/degradation_latency.png"
  description: "Line plot of latency-adjusted throughput vs. injected latency for 4 agents. Column-width figure, 300 DPI."
  linked_milestone: "M5"
  created_at: "2025-03-01T00:00:00"
- id: art-10
  type: figure
  name: "Pareto Frontier"
  path: "paper/figures/pareto_frontier.png"
  description: "Cost vs. accuracy scatter plot with Pareto frontier highlighted for each agent framework. Non-dominated points connected."
  linked_milestone: "M5"
  created_at: "2025-03-02T00:00:00"
- id: art-11
  type: figure
  name: "Failure Mode Distribution"
  path: "paper/figures/failure_modes.png"
  description: "Stacked bar chart of 6 failure types (budget_exhaustion, timeout, wrong_tool, hallucinated_tool, cascading_error, format_error) per agent."
  linked_milestone: "M5"
  created_at: "2025-03-02T00:00:00"
- id: art-12
  type: figure
  name: "Noise Sensitivity Heatmap"
  path: "paper/figures/noise_sensitivity.png"
  description: "Heatmap of accuracy drop per noise type (truncation, stale, format_error) and noise rate for each agent."
