  created_at: "2025-03-03T00:00:00"
- id: art-13
  type: table
  name: "Main Results Table"
  path: "paper/tables/main_results.tex"
  description: "LaTeX table: rows = 6 agents (4 frameworks + 2 baselines), columns = 6 task families + mean. Bold best, underline second."
  linked_milestone: "M5"
  created_at: "2025-03-03T00:00:00"
- id: art-14
  type: table
  name: "Pairwise Significance Table"
  path: "paper/tables/pairwise_significance.tex"
  description: "6×6 Wilcoxon signed-rank p-value table with Bonferroni correction. Significant pairs marked with asterisks."
  linked_milestone: "M5"
  created_at: "2025-03-03T00:00:00"
- id: art-15
  type: table
  name: "Taxonomy Comparison Table"
