steps:
- id: VR-01
  title: Positioning statement & scope document
  description: Define the paper's contribution relative to existing agent benchmarks
    and robustness studies.
  acceptance: '2-page scope doc with: gap statement, 3 core claims, target venue,
    and non-goals list approved'
  section: Phase 0 — Positioning & Scope
  phase: 0
  status: doing
  linked_milestone: M1
  designspec_refs:
  - positioning
  - scope
  deliverables:
  - docs/scope.md with gap analysis
  - Contribution bullet list (3 claims)
  - Target venue analysis (NeurIPS D&B vs ICML vs EMNLP)
  - Non-goals list (what we explicitly do NOT evaluate)
  prompt_hint: Draft a 2-page positioning document identifying the gap in agent robustness
    evaluation and stating 3 core claims.
  prompt_expanded: "## Context\nYou are writing a positioning document for a paper\
    \ that introduces a benchmark\nfor evaluating tool-using LLM agents under budget/latency/noise\
    \ constraints.\nNo existing benchmark systematically measures degradation under\
    \ these axes.\n\n## Grounding Instructions\nOnly cite from the seeded references\
    \ in the literature panel or from papers\nyou have imported via CSV. Do not hallucinate\
    \ citations.\n\n## Key References to Position Against\n- AgentBench (Liu et al.,\
    \ 2023): evaluates agents but not under resource constraints\n- ToolLLM (Qin et\
    \ al., 2024): 16K APIs but no budget/latency stress testing\n- Gorilla (Patil\
    \ et al., 2023): API selection accuracy, not degradation curves\n\n## Required\
    \ Sections\n1. **Gap Statement** (1 paragraph): What is missing in current benchmarks?\n\
    2. **Core Claims** (3 bullets): What does this paper contribute?\n   - Claim 1:\
    \ First systematic 3-axis stress framework for agent evaluation\n   - Claim 2:\
    \ Audit-grade trace format enabling post-hoc failure analysis\n   - Claim 3: Pre-computed\
    \ degradation curves for 4 agent frameworks\n3. **Target Venue**: NeurIPS Datasets\
    \ & Benchmarks track — justify fit\n4. **Non-Goals**: List 5 things explicitly\
    \ out of scope\n5. **Related Work Taxonomy**: Table with columns: Paper, Year,\
    \ Tools?, Budget?, Latency?, Noise?\n\n## Deliverable Format\nWrite as a Markdown\
    \ document with the 5 sections above. Use tables where specified.\n"
- id: VR-02
  title: Related work survey & taxonomy table
  description: Comprehensive survey of agent evaluation, tool-use benchmarks, and
    robustness testing literature.
  acceptance: Survey covers ≥30 papers; taxonomy table has ≥15 rows with 6 comparison
    axes; no hallucinated citations
  section: Phase 1 — Related Work & Taxonomy
  phase: 1
  status: doing
  linked_milestone: M2
  designspec_refs:
  - related-work
  - taxonomy
  deliverables:
  - docs/related_work.md with themed subsections
  - Taxonomy table (LaTeX) comparing 15+ benchmarks on 6 axes
  - Gap analysis paragraph per theme
  - BibTeX entries for all cited papers
  prompt_hint: Write a structured related work survey with 4 themes and a comparison
    table for 15+ agent benchmarks.
  prompt_expanded: '## Context

    The related work section must cover 4 themes and include a comparison table.

    Only cite papers from your imported literature or the seeded references.


    ## Required Themes

    1. **LLM Agent Architectures** (ReAct, Toolformer, AutoGPT, LangChain)

    2. **Agent Evaluation Benchmarks** (AgentBench, ToolLLM, Gorilla, WebArena)

    3. **Robustness & Stress Testing in NLP** (adversarial attacks, distribution shift)

    4. **Tool-Use & API Benchmarks** (API selection, function calling, tool learning)


    ## Taxonomy Table Columns

    | Paper | Year | Venue | #Tasks | Tools? | Budget Axis? | Latency Axis? | Noise
    Axis? | Trace Logging? | Open Source? |


    ## Gap Analysis

    For each theme, write a 2-3 sentence gap analysis explaining what our

    benchmark adds that existing work does not cover.


    ## Reproducibility Checklist

    - [ ] Every citation has a BibTeX entry

    - [ ] No hallucinated papers (verify against seeded references)

    - [ ] Table has ≥15 rows

    - [ ] Each theme has 5-10 papers discussed

    '
- id: VR-03
  title: Benchmark specification & threat model
  description: Formal specification of the benchmark design, threat model, and validity
    arguments.
  acceptance: Spec document defines all 6 task families, 3 stress axes, validity threats,
    and mitigation strategies
  section: Phase 2 — Benchmark Spec & Threat Model
  phase: 2
  status: todo
  linked_milestone: M3
  designspec_refs:
  - benchmark-spec
  - threat-model
  deliverables:
  - docs/benchmark_spec.md (formal specification)
  - Threat model table (construct validity, external validity, reliability)
  - Task family specifications with example instances
  - Constraint axis formal definitions with parameter ranges
  prompt_hint: Write a formal benchmark specification with task family definitions,
    constraint axis parameters, and a validity threat model.
  prompt_expanded: "## Context\nThe benchmark spec is the authoritative reference\
    \ for what the benchmark measures\nand how. It must be precise enough for independent\
    \ replication.\n\n## Required Sections\n1. **Task Family Definitions**: For each\
    \ of 6 families, specify:\n   - Input format, output format, ground truth type\n\
    \   - Number of instances (dev/test split)\n   - Required tools\n   - Scoring\
    \ function (exact match, F1, constraint satisfaction)\n2. **Constraint Axes**:\
    \ For each axis:\n   - Parameter name, type, range, default\n   - Injection mechanism\
    \ (where in the pipeline)\n   - Measurement (what metric it most affects)\n3.\
    \ **Threat Model** (table):\n   | Threat | Type | Severity | Mitigation |\n  \
    \ - Construct validity: do simulated tools reflect real APIs?\n   - External validity:\
    \ do results generalize to non-benchmarked agents?\n   - Reliability: are results\
    \ stable across seeds?\n   - Ecological validity: are the task families representative?\n\
    4. **Validity Arguments**: 1 paragraph per threat explaining why the\n   benchmark\
    \ design mitigates it.\n\n## Figure Planning\n- Figure 1: Benchmark architecture\
    \ diagram (7 modules)\n- Figure 2: Task family examples (one per family)\n- Table\
    \ 1: Task family summary statistics\n"
- id: VR-04
  title: 'Experimental design: factorial grid & power analysis'
  description: Design the full experimental protocol with factorial grid, sample sizes,
    and statistical tests.
  acceptance: Experiment design doc specifies grid cells, runs per cell, statistical
    tests, and estimated compute budget
  section: Phase 3 — Experimental Design
  phase: 3
  status: todo
  linked_milestone: M4
  designspec_refs:
  - experiment-design
  - factorial-grid
  - power-analysis
  deliverables:
  - docs/experiment_design.md
  - Factorial grid table (27 cells with parameter values)
  - Power analysis for detecting 5% accuracy difference
  - Compute budget estimate (GPU hours, API costs)
  - Statistical test plan (bootstrap CI, Wilcoxon, Bonferroni correction)
  prompt_hint: Design the factorial experiment with 27-cell grid, power analysis,
    and a statistical testing plan.
  prompt_expanded: '## Context

    We need a rigorous experimental design that supports the paper''s claims.

    The factorial grid is budget × latency × noise (3×3×3 = 27 cells).


    ## Experiment Grid

    | Factor | Levels | Values |

    |--------|--------|--------|

    | Budget (max_calls) | 3 | 5, 15, 50 |

    | Latency (ms) | 3 | 0, 500, 5000 |

    | Noise | 3 | none, truncate-25%, format-15% |

    | Seeds | 3 | 42, 43, 44 |

    | Agents | 4 | ReAct, Toolformer, AutoGPT, LangChain |

    | Families | 6 | retrieval, codegen, data_analysis, multihop_qa, planning, web_nav
    |


    Total runs = 27 × 3 × 4 × 6 = 1944 (dev split for iteration)


    ## Statistical Tests

    - 95% bootstrap CI (10,000 resamples) for each metric

    - Wilcoxon signed-rank test for pairwise agent comparisons

    - Bonferroni correction for multiple comparisons (k=6 families)


    ## Power Analysis

    - Detect 5% accuracy difference with 80% power at α=0.05

    - Required sample size per cell: estimate using Cohen''s h


    ## Compute Budget

    - Estimate wall-clock time per run (dev split)

    - Total GPU hours = runs × time_per_run

    - API cost estimate (if using real LLM backends)

    '
- id: VR-05
  title: 'Pilot experiment: 2 agents × 2 families × dev split'
  description: Run a reduced pilot to validate the harness, identify bugs, and calibrate
    parameters.
  acceptance: Pilot completes without errors; traces valid; metrics computed; at least
    one interesting finding documented
  section: Phase 3 — Experimental Design
  phase: 3
  status: todo
  linked_milestone: M4
  designspec_refs:
  - pilot
  - validation
  deliverables:
  - results/pilot/ directory with traces and metrics
  - docs/pilot_findings.md with preliminary observations
  - Bug list with fixes applied
  - Parameter calibration notes (e.g., adjusted noise rates)
  prompt_hint: Run a pilot experiment with 2 agents × 2 families on dev split, document
    findings and parameter adjustments.
  prompt_expanded: "## Context\nBefore running the full grid, we run a reduced pilot\
    \ to validate everything works.\nThis catches integration bugs, calibrates noise\
    \ parameters, and produces preliminary\nresults for the paper introduction.\n\n\
    ## Pilot Configuration\n- Agents: NoTool, ReAct\n- Families: TF-Retrieval, TF-CodeGen\n\
    - Grid: full 27-cell grid but only 1 seed (42)\n- Total runs: 27 × 1 × 2 × 2 =\
    \ 108\n\n## Deliverables\n1. Run all 108 configurations\n2. Compute metrics for\
    \ each\n3. Generate preliminary degradation curves\n4. Document:\n   - Any bugs\
    \ found (with fixes)\n   - Surprising results (e.g., NoTool outperforming ReAct\
    \ on some cells)\n   - Parameter adjustments needed (e.g., noise rate too aggressive)\n\
    \n## Reproducibility Checklist\n- [ ] All runs completed without crashes\n- [\
    \ ] Traces are valid JSONL (validate with schema)\n- [ ] Metrics match hand-spot-checked\
    \ values (3 random cells)\n- [ ] Degradation curves are monotonically decreasing\
    \ (or explain why not)\n"
- id: VR-06
  title: 'Full experiment run: 4 agents × 6 families × 27 cells × 3 seeds'
  description: Execute the complete factorial experiment and collect all results.
  acceptance: 1944 runs completed; all traces valid; aggregate metrics CSV has 1944
    rows; no NaN values
  section: Phase 4 — Results & Analysis
  phase: 4
  status: todo
  linked_milestone: M5
  designspec_refs:
  - full-experiment
  - results-collection
  deliverables:
  - results/full/ directory organized by agent/family/
  - results/aggregate_metrics.csv (1944 rows)
  - results/degradation_curves/ per agent per family
  - Execution log with runtime statistics
  prompt_hint: Run the complete 1944-run factorial experiment with parallel execution
    and aggregate all metrics.
  prompt_expanded: '## Context

    The full experiment is the core of the paper. It must run reliably,

    handle failures gracefully (retry with exponential backoff), and

    produce complete, analyzable results.


    ## Execution Plan

    1. Run in parallel with 8 workers

    2. Save traces to results/full/{agent}/{family}/{budget}_{latency}_{noise}_{seed}/

    3. Compute per-run metrics immediately after each run

    4. Aggregate into results/aggregate_metrics.csv

    5. Generate degradation curves per agent per family


    ## Quality Checks

    - [ ] All 1944 runs completed (check for missing result files)

    - [ ] No NaN values in aggregate_metrics.csv

    - [ ] Traces are valid JSONL (batch validation script)

    - [ ] Audit completeness: 100% of tool calls have span_ids

    - [ ] Results are reproducible (re-run 5 random cells, compare)

    '
- id: VR-07
  title: 'Results analysis: degradation curves, Pareto frontiers, failure modes'
  description: Analyze full results to extract key findings for the paper.
  acceptance: Analysis doc identifies ≥5 key findings; all claims supported by data;
    statistical tests applied
  section: Phase 4 — Results & Analysis
  phase: 4
  status: todo
  linked_milestone: M5
  designspec_refs:
  - analysis
  - findings
  deliverables:
  - docs/analysis.md with 5+ key findings
  - Degradation curve figures (1 per agent, all families overlaid)
  - Pareto frontier figure (all agents on one plot)
  - Failure mode distribution figure
  - Statistical significance table for pairwise comparisons
  prompt_hint: Analyze the 1944-run results to extract degradation curves, Pareto
    frontiers, failure mode distributions, and 5+ key findings.
  prompt_expanded: "## Context\nThe analysis section is where data becomes insight.\
    \ We need to extract\nfindings that support our 3 core claims and provide actionable\
    \ guidance\nfor practitioners.\n\n## Required Analyses\n1. **Degradation Curves**:\
    \ Plot accuracy vs. budget for each agent,\n   faceted by task family. Fit linear\
    \ model, report slope and R².\n2. **Pareto Frontiers**: Cost vs. accuracy for\
    \ each agent across all\n   budget levels. Highlight non-dominated points.\n3.\
    \ **Failure Mode Distribution**: Stacked bar chart of 6 failure types\n   per\
    \ agent. Identify dominant failure modes.\n4. **Latency Impact**: Throughput vs.\
    \ latency for each agent.\n   Identify which agents handle latency gracefully.\n\
    5. **Noise Sensitivity**: Accuracy drop per noise type and rate.\n   Identify\
    \ which noise types are most damaging.\n\n## Key Findings Template\nFor each finding:\n\
    - **Finding**: One sentence summary\n- **Evidence**: Specific numbers with CI\n\
    - **Implication**: What practitioners should do\n\n## Figure Planning\n- Fig 3:\
    \ Degradation curves (2×3 grid: agent × family subset)\n- Fig 4: Pareto frontiers\
    \ (single plot, 4 agents)\n- Fig 5: Failure modes (stacked bar)\n- Table 3: Pairwise\
    \ significance (Wilcoxon p-values)\n"
- id: VR-08
  title: 'Paper draft: Introduction, Method, Experiments sections'
  description: Write the first complete paper draft with all required sections.
  acceptance: Draft has all 8 sections; ≥7 pages; all figures/tables referenced; no
    placeholder text
  section: Phase 5 — Writing & Figures
  phase: 5
  status: todo
  linked_milestone: M6
  designspec_refs:
  - paper-draft
  - writing
  deliverables:
  - paper/main.tex (8+ pages)
  - paper/figures/ with all referenced figures
  - paper/tables/ with all referenced tables
  - paper/references.bib
  - Self-review checklist completed
  prompt_hint: Write a complete 8-page paper draft with Introduction, Related Work,
    Benchmark Design, Experimental Setup, Results, Analysis, Conclusion, and Appendix.
  prompt_expanded: '## Context

    Write the first complete draft targeting NeurIPS Datasets & Benchmarks.

    Format: 8 pages main + unlimited appendix. LaTeX with neurips_2024 style.


    ## Section Outline

    1. **Introduction** (1 page): Motivation → gap → claims → contributions → paper
    structure

    2. **Related Work** (1.5 pages): From VR-02 survey, condensed with taxonomy table

    3. **Benchmark Design** (2 pages): Task families, constraint axes, trace format,
    baselines

    4. **Experimental Setup** (0.5 pages): Grid config, compute budget, statistical
    methods

    5. **Results** (2 pages): Degradation curves, Pareto, failure modes, key findings

    6. **Discussion** (0.5 pages): Limitations, broader impact, future work

    7. **Conclusion** (0.5 pages): Summary of contributions and key takeaways

    8. **Appendix**: Full task family specs, additional figures, reproducibility checklist


    ## Figure/Table Integration

    - Figure 1: Architecture diagram (from VR-03)

    - Figure 2: Degradation curves (from VR-07)

    - Figure 3: Pareto frontiers (from VR-07)

    - Figure 4: Failure modes (from VR-07)

    - Table 1: Task family summary (from VR-03)

    - Table 2: Main results (accuracy × agent × family)

    - Table 3: Pairwise significance (from VR-07)

    - Table 4: Taxonomy comparison (from VR-02)


    ## Reproducibility Checklist

    - [ ] All numbers in text match tables/figures

    - [ ] All citations have BibTeX entries

    - [ ] All figures have captions and are referenced in text

    - [ ] Code availability statement included

    '
- id: VR-09
  title: Figures & tables finalization
  description: Create all publication-quality figures and tables with consistent styling.
  acceptance: All figures are 300 DPI, consistent color scheme, readable at 50% zoom;
    all tables compile in LaTeX
  section: Phase 5 — Writing & Figures
  phase: 5
  status: todo
  linked_milestone: M7
  designspec_refs:
  - figures
  - tables
  - visual-design
  deliverables:
  - paper/figures/ with 6+ figures (300 DPI PNG + PDF vector)
  - paper/tables/ with 4+ LaTeX tables
  - 'Style guide: color palette, font sizes, line styles'
  - 'Figure generation script: scripts/generate_figures.py'
  prompt_hint: 'Create publication-quality figures using matplotlib with consistent
    style: degradation curves, Pareto frontiers, failure modes, architecture diagram.'
  prompt_expanded: '## Context

    Figures must be publication-quality for NeurIPS. Use a consistent color palette

    and style across all figures.


    ## Style Guide

    - Color palette: seaborn ''colorblind'' (accessible)

    - Font: serif (matches LaTeX body), 10pt labels, 12pt titles

    - Line styles: solid for main agents, dashed for baselines

    - Grid: light gray, major only

    - DPI: 300 for PNG, also export PDF vector versions

    - Size: figures fit in NeurIPS column width (3.25") or full width (6.75")


    ## Figure Specifications

    | Figure | Type | Size | Data Source |

    |--------|------|------|-------------|

    | architecture | diagram | full-width | hand-drawn + tikz |

    | degradation_budget | line plot | full-width, 2×3 grid | aggregate_metrics.csv
    |

    | degradation_latency | line plot | column-width | aggregate_metrics.csv |

    | pareto_frontier | scatter + line | column-width | pareto_points.csv |

    | failure_modes | stacked bar | column-width | failure_analysis.csv |

    | noise_sensitivity | heatmap | full-width | aggregate_metrics.csv |


    ## Table Specifications

    | Table | Rows | Columns | Notes |

    |-------|------|---------|-------|

    | task_families | 6 | 5 (family, #instances, tools, scoring, example) | |

    | main_results | 6 agents | 6 families + mean | bold best, underline second |

    | pairwise_significance | 6×6 | p-values | Bonferroni corrected |

    | taxonomy | 15+ papers | 10 comparison axes | ✓/✗ symbols |

    '
- id: VR-10
  title: Internal review, revision & camera-ready
  description: Get feedback, revise, and prepare camera-ready submission.
  acceptance: All reviewer comments addressed; paper compiles without warnings; supplementary
    material ready
  section: Phase 5 — Writing & Figures
  phase: 5
  status: todo
  linked_milestone: M8
  designspec_refs:
  - review
  - camera-ready
  deliverables:
  - Revision log with response to each comment
  - Camera-ready paper/main.tex
  - Supplementary material (appendix, code link, data link)
  - Submission confirmation
  prompt_hint: Revise the paper based on internal review feedback, prepare camera-ready
    version and supplementary materials.
  prompt_expanded: '## Context

    After internal review, address all comments and prepare the final version.


    ## Review Process

    1. Share draft with 2 internal reviewers

    2. Collect structured feedback (per-section comments)

    3. Create revision log: comment → response → change made

    4. Revise paper

    5. Final proofread pass

    6. Prepare supplementary material


    ## Camera-Ready Checklist

    - [ ] Paper fits within page limit (8 pages + unlimited appendix)

    - [ ] All figures are high-resolution and readable in print

    - [ ] Abstract ≤ 250 words

    - [ ] Author information correct

    - [ ] Acknowledgments section present (funding, compute credits)

    - [ ] Code availability: GitHub link with DOI (Zenodo)

    - [ ] Data availability: task instances hosted on HuggingFace

    - [ ] License: Apache 2.0 for code, CC BY 4.0 for data

    - [ ] Reproducibility checklist (NeurIPS format) completed


    ## Supplementary Material

    - Appendix A: Full task family specifications

    - Appendix B: Complete results tables (all 1944 runs)

    - Appendix C: Adapter implementation details

    - Appendix D: Trace schema specification

    - Code: https://github.com/vibeops/agent-budget-bench

    - Data: https://huggingface.co/datasets/vibeops/agent-budget-bench

    '
