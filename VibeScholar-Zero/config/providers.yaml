# AI Provider Configuration
# Each provider has: baseUrl, apiKey, api protocol, and model list.
# apiKey can be left empty; the UI will flag it as "required to call".

providers:
  openai:
    baseUrl: "https://api.openai.com/v1"
    apiKey: ""
    api: "openai-chat"
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
        reasoning: false
        contextWindow: 128000
        maxTokens: 16384
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        reasoning: false
        contextWindow: 128000
        maxTokens: 16384
      - id: "o3-mini"
        name: "o3-mini"
        reasoning: true
        contextWindow: 200000
        maxTokens: 100000

  anthropic:
    baseUrl: "https://api.anthropic.com"
    apiKey: ""
    api: "anthropic-messages"
    models:
      - id: "claude-sonnet-4-20250514"
        name: "Claude Sonnet 4"
        reasoning: true
        contextWindow: 200000
        maxTokens: 64000
      - id: "claude-3-5-haiku-20241022"
        name: "Claude 3.5 Haiku"
        reasoning: false
        contextWindow: 200000
        maxTokens: 8192

  google:
    baseUrl: "https://generativelanguage.googleapis.com/v1beta"
    apiKey: ""
    api: "google-genai"
    models:
      - id: "gemini-2.5-flash"
        name: "Gemini 2.5 Flash"
        reasoning: true
        contextWindow: 1048576
        maxTokens: 65536
      - id: "gemini-2.5-pro"
        name: "Gemini 2.5 Pro"
        reasoning: true
        contextWindow: 1048576
        maxTokens: 65536

  minimax:
    baseUrl: "https://api.minimaxi.com/anthropic"
    apiKey: ""
    api: "anthropic-messages"
    models:
      - id: "MiniMax-M2.5"
        name: "MiniMax-M2.5"
        reasoning: true
        contextWindow: 204800
        maxTokens: 131072
