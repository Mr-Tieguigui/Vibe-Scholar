# ─────────────────────────────────────────────────────────
# VibeScholar — Project Content Template (Legacy YAML)
# ─────────────────────────────────────────────────────────
# NOTE: The preferred format is now JSON. Download the JSON
# template from VibeScholar instead.
#
# TIP: Use Gemini / GPT / Claude to help fill sections:
#   "Fill this template for a research project about [topic]"
# ─────────────────────────────────────────────────────────

# ── Project Metadata ────────────────────────────────────
id: ""           # lowercase slug, e.g. "my-project"
name: ""         # display name (Chinese OK)
name_en: ""      # English display name
definition: ""   # one-sentence project definition
pillar: ""       # e.g. "P1: Safety", "P2: Methods"
tags: []         # e.g. [safety, audit, llm]
priority: "P2"   # P0=Critical, P1=High, P2=Medium, P3=Low

# ── Overview Sections ───────────────────────────────────
overview:
  definition: |
    # What is this project?
    Describe the core research question or system you are building.

  motivation: |
    # Why does it matter?
    - Context point 1
    - Context point 2
    - Impact statement

  scope: |
    # What is in/out of scope?
    **In scope:**
    - Item 1
    - Item 2
    **Out of scope:**
    - Item 1

  questions:
    - "Research question 1?"
    - "Research question 2?"
    - "Research question 3?"

  concepts:
    - term: "Concept A"
      description: "Brief description of concept A and its role in the project."
    - term: "Concept B"
      description: "Brief description of concept B."

  pipeline:
    - step: "Data Collection"
      description: "Gather raw data from sources X, Y, Z."
    - step: "Processing"
      description: "Clean, transform, and feature-engineer the data."
    - step: "Model Training"
      description: "Train and validate models using approach A."
    - step: "Evaluation"
      description: "Run evaluations against baselines."

  evaluation:
    - label: "Primary Metric"
      value: "Accuracy / F1 / Pass@k — target: X%"
    - label: "Secondary Metric"
      value: "Latency / Robustness — target: Y"
    - label: "Baseline"
      value: "Compare against Z"

  deliverables:
    - "Research paper (target venue: ...)"
    - "Open-source code repository"
    - "Demo or visualization"

  milestones:
    - id: "M1"
      title: "Data & Setup Ready"
      week: "W1-2"
      acceptance: "Dataset assembled, environment configured, baseline running."
    - id: "M2"
      title: "Core Method Implemented"
      week: "W3-5"
      acceptance: "Main algorithm implemented and passing unit tests."
    - id: "M3"
      title: "Experiments Complete"
      week: "W6-8"
      acceptance: "All experiments run, results tables generated."
    - id: "M4"
      title: "Paper Draft"
      week: "W9-10"
      acceptance: "Full paper draft with all sections, figures, tables."
    - id: "M5"
      title: "Submission Ready"
      week: "W11-12"
      acceptance: "Camera-ready after internal review."

  risks:
    - risk: "Risk description 1"
      mitigation: "How to mitigate risk 1"
    - risk: "Risk description 2"
      mitigation: "How to mitigate risk 2"

  literature:
    - label: "Survey"
      value: "Key survey paper or review to start from"
    - label: "Seminal Work"
      value: "Foundational paper in this area"
    - label: "Recent SOTA"
      value: "Latest state-of-the-art result or method"

  next_actions:
    - "Set up project repository and environment"
    - "Complete literature survey (20+ papers)"
    - "Implement baseline method"
    - "Run first round of experiments"

